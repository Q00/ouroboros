goal: Create a simple hello world Python script

constraints:
  - Python 3.12 or higher
  - Single file implementation
  - No external dependencies

acceptance_criteria:
  - Create hello.py file with proper print statement
  - Add shebang line for direct execution
  - Make the file executable with chmod
  - Test that script runs and outputs correctly

ontology_schema:
  name: HelloWorldDemo
  description: Simple hello world script for MCP demo
  fields:
    - name: script_file
      field_type: string
      description: Path to hello.py file
      required: true
    - name: output
      field_type: string
      description: Script output text
      required: true

evaluation_principles:
  - name: correctness
    description: Script executes without errors
    weight: 1.0
  - name: completeness
    description: All acceptance criteria met
    weight: 1.0

exit_conditions:
  - name: all_criteria_met
    description: All 4 acceptance criteria completed
    evaluation_criteria: Script created, executable, and tested

metadata:
  seed_id: demo_hello_world
  version: 1.0.0
  ambiguity_score: 0.05
